<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KURO Banking</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container" id="login-view">
        <h2>Welcome back</h2>
        <div id="login-error" class="alert"></div>
        
        <div class="form-group">
            <label>Username or Email</label>
            <input type="text" id="identifier" placeholder="danny@example.com">
        </div>
        <div class="form-group">
            <label>Password</label>
            <input type="password" id="password" placeholder="••••••••">
        </div>
        
        <button id="login-btn">Log In</button>
    </div>

    <div class="container hidden" id="dashboard-view">
        <h2>Transfer Funds</h2>
        <div id="transfer-message" class="alert" style="color: #3b82f6;"></div>
        
        <div class="form-group">
            <label>From (Your Bank Number)</label>
            <input type="text" id="sender-bank-number" placeholder="e.g., 100000001">
        </div>
        <div class="form-group">
            <label>To (Receiver Bank Number)</label>
            <input type="text" id="receiver-bank-number" placeholder="e.g., 100000002">
        </div>
        <div class="form-group">
            <label>Amount (VND)</label>
            <input type="number" id="amount" placeholder="100">
        </div>
        <div class="form-group">
            <label>4-Digit Passcode</label>
            <input type="password" id="transfer-passcode" placeholder="••••">
        </div>
        
        <button id="transfer-btn">Send Money</button>
        <hr style="border: 0; border-top: 1px solid #e4e4e7; margin: 30px 0;">
        <h2>Transaction History</h2>
        <div style="overflow-x: auto;">
            <table id="history-table">
                <thead>
                    <tr>
                        <th>Date</th>
                        <th>Sender Wallet</th>
                        <th>Receiver Wallet</th>
                        <th>Amount</th>
                        <th>Status</th>
                    </tr>
                </thead>
                <tbody id="history-tbody">
                    </tbody>
            </table>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
